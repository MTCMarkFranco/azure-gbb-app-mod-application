name: ✅ Validate Qualifications

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate-qualifications:
    name: ✅ Validate Qualifications
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "Check 1: 7+ years technical pre-sales or consulting"
        run: |
          echo "::group::📋 Requirement: 7+ years in technical pre-sales or consulting"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: 7+ years technical pre-sales or consulting   │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • 19 years at Microsoft as Principal Solution Engineer    │"
          echo "│  • Role is pre-sales / technical consulting by definition  │"
          echo "│  • 19 years exceeds 7-year minimum by 171%                │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  YEARS REQUIRED: 7    YEARS ACTUAL: 19                    │"
          echo "│  ✅ PASS                                                   │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 1 PASSED::7+ years pre-sales/consulting — 19 years at Microsoft ✅"
          REQUIRED=7; ACTUAL=19
          if [ "$ACTUAL" -ge "$REQUIRED" ]; then echo "CHECK1=PASS" >> "$GITHUB_ENV"; else exit 1; fi

      - name: "Check 2: 8+ years technical pre-sales, consulting, or delivery (preferred)"
        run: |
          echo "::group::📋 Requirement: 8+ years technical pre-sales, consulting, or delivery"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: 8+ years technical consulting/delivery       │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • 19 years at Microsoft in technical pre-sales            │"
          echo "│  • Led enterprise modernization and AI engagements         │"
          echo "│  • 19 years exceeds 8-year preferred by 138%              │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  YEARS REQUIRED: 8    YEARS ACTUAL: 19                    │"
          echo "│  ✅ PASS                                                   │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 2 PASSED::8+ years consulting/delivery — 19 years at Microsoft ✅"
          REQUIRED=8; ACTUAL=19
          if [ "$ACTUAL" -ge "$REQUIRED" ]; then echo "CHECK2=PASS" >> "$GITHUB_ENV"; else exit 1; fi

      - name: "Check 3: 6+ years cloud/hybrid architectures and migrations"
        run: |
          echo "::group::📋 Requirement: 6+ years cloud architectures, migrations, technology management"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: 6+ years cloud/hybrid architectures          │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • Azure Solutions Architect Expert certified              │"
          echo "│  • 19 years driving Azure adoption and cloud migrations    │"
          echo "│  • Led AKS, Container Apps, Functions engagements          │"
          echo "│  • Competitive displacement from AWS/GCP to Azure          │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  YEARS REQUIRED: 6    YEARS ACTUAL: 19                    │"
          echo "│  ✅ PASS                                                   │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 3 PASSED::6+ years cloud architectures — Azure Architect Expert, 19 years ✅"
          REQUIRED=6; ACTUAL=19
          if [ "$ACTUAL" -ge "$REQUIRED" ]; then echo "CHECK3=PASS" >> "$GITHUB_ENV"; else exit 1; fi

      - name: "Check 4: Azure platform expertise (AKS, ARO, ACA, App Service, Functions)"
        run: |
          echo "::group::📋 Requirement: Hands-on Azure platform expertise"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: Hands-on AKS, ARO, ACA, App Service,        │"
          echo "│               Functions expertise                          │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • Architected microservices on AKS and Container Apps     │"
          echo "│  • Built serverless solutions with Azure Functions         │"
          echo "│  • App Service deployments for enterprise customers        │"
          echo "│  • 127+ GitHub repos with cloud-native implementations    │"
          echo "│  • Containerized microservice projects (rules-iq, etc.)    │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  ✅ PASS — Deep hands-on expertise demonstrated            │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 4 PASSED::Azure platform expertise — AKS, ACA, Functions hands-on ✅"
          echo "CHECK4=PASS" >> "$GITHUB_ENV"

      - name: "Check 5: .NET and Java development & modernization experience"
        run: |
          echo "::group::📋 Requirement: .NET and Java development and modernization"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: .NET and Java development & modernization    │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • C#/.NET primary language (40% of coding output)         │"
          echo "│  • Java experience across enterprise engagements           │"
          echo "│  • Led legacy .NET Framework refactoring to cloud-native   │"
          echo "│  • Open-source projects: rules-iq (C#), voice-agent (C#)  │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  ✅ PASS — Proven .NET/Java modernization experience       │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 5 PASSED::.NET/Java expertise — C#/.NET primary language, legacy refactoring ✅"
          echo "CHECK5=PASS" >> "$GITHUB_ENV"

      - name: "Check 6: CI/CD pipelines (GitHub Actions, Azure DevOps)"
        run: |
          echo "::group::📋 Requirement: CI/CD pipelines with GitHub Actions and Azure DevOps"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: CI/CD with GitHub Actions & Azure DevOps     │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • This repo uses GitHub Actions CI/CD pipeline            │"
          echo "│  • Extensive Azure DevOps experience for enterprise CI/CD  │"
          echo "│  • Promoted DevOps culture for enterprise customers        │"
          echo "│  • Infrastructure as Code with Bicep and ARM               │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  ✅ PASS — Active CI/CD practitioner                       │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 6 PASSED::CI/CD — GitHub Actions and Azure DevOps expertise ✅"
          echo "CHECK6=PASS" >> "$GITHUB_ENV"

      - name: "Check 7: Executive presence with senior technical decision-makers"
        run: |
          echo "::group::📋 Requirement: Executive presence with CXO-level engagement"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: Executive presence with CXO engagement       │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • 19 years engaging CXO-level decision-makers             │"
          echo "│  • Featured Speaker at AI Tour Toronto                     │"
          echo "│  • Published thought leader on Medium and LinkedIn         │"
          echo "│  • Drove modernization decisions by aligning business      │"
          echo "│    value with strategic IT transformation goals            │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  ✅ PASS — Proven CXO engagement track record              │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 7 PASSED::Executive presence — 19 years CXO engagement ✅"
          echo "CHECK7=PASS" >> "$GITHUB_ENV"

      - name: "Check 8: Competitive cloud displacement (Azure vs AWS/GCP)"
        run: |
          echo "::group::📋 Requirement: Competitive displacement expertise"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: Competitive cloud displacement expertise     │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • Led strategic migrations from AWS/GCP to Azure          │"
          echo "│  • Created net-new Azure consumption revenue               │"
          echo "│  • Deep understanding of hyperscaler competitive landscape │"
          echo "│  • Built win-back and surround competitive strategies      │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  ✅ PASS — Proven competitive displacement track record    │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 8 PASSED::Competitive displacement — AWS/GCP to Azure migrations ✅"
          echo "CHECK8=PASS" >> "$GITHUB_ENV"

      - name: "Check 9: Azure certification"
        run: |
          echo "::group::📋 Requirement: Certification in relevant technologies"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  REQUIREMENT: Azure certification                          │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  EVIDENCE:                                                 │"
          echo "│  • Azure Solutions Architect Expert                        │"
          echo "│  • AZ-300: Azure Architect Technologies                    │"
          echo "│  • AZ-301: Azure Architect Design                          │"
          echo "│  • MCSA: Cloud Platform                                    │"
          echo "│  • Exam 532: Developing Microsoft Azure Solutions          │"
          echo "│  • Exam 534: Architecting Microsoft Azure Solutions        │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│  ✅ PASS — Multiple Azure certifications held              │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
          echo "::notice title=Check 9 PASSED::Azure certified — Solutions Architect Expert + 5 more ✅"
          echo "CHECK9=PASS" >> "$GITHUB_ENV"

      - name: "📊 Final Summary"
        run: |
          echo ""
          echo "╔═════════════════════════════════════════════════════════════╗"
          echo "║                                                           ║"
          echo "║    QUALIFICATION VALIDATION — FINAL RESULTS               ║"
          echo "║                                                           ║"
          echo "║    Role: Azure GBB Modernization Solution Engineer        ║"
          echo "║    Candidate: Mark Franco                                 ║"
          echo "║    Job ID: 200030741                                      ║"
          echo "║                                                           ║"
          echo "╠═════════════════════════════════════════════════════════════╣"
          echo "║                                                           ║"
          echo "║    ✅ Check 1: 7+ years pre-sales/consulting     PASS     ║"
          echo "║    ✅ Check 2: 8+ years consulting/delivery      PASS     ║"
          echo "║    ✅ Check 3: 6+ years cloud architectures      PASS     ║"
          echo "║    ✅ Check 4: Azure platform expertise           PASS     ║"
          echo "║    ✅ Check 5: .NET/Java modernization            PASS     ║"
          echo "║    ✅ Check 6: CI/CD (GitHub Actions/ADO)         PASS     ║"
          echo "║    ✅ Check 7: Executive presence / CXO           PASS     ║"
          echo "║    ✅ Check 8: Competitive displacement           PASS     ║"
          echo "║    ✅ Check 9: Azure certifications               PASS     ║"
          echo "║                                                           ║"
          echo "║    RESULT: 9/9 PASSED ✅                                  ║"
          echo "║                                                           ║"
          echo "╚═════════════════════════════════════════════════════════════╝"
          echo ""
          echo "::notice title=✅ ALL QUALIFICATIONS VALIDATED::Mark Franco meets or exceeds all 9 qualification checks for the Azure GBB Modernization Solution Engineer role"
